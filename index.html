<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question For You 💖</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            overflow: hidden;
            text-align: center;
            padding: 20px;
            transition: background 0.5s ease;
            position: relative;
        }

        body.success-bg {
            background: #ff477e !important;
        }

        /* Container for falling hearts background */
        .hearts-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .falling-heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            animation: fall linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 500px;
            width: 100%;
            transition: all 0.5s ease;
            z-index: 2;
        }

        .success-card-style {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .names {
            color: #ffeef8;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            min-height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.1s ease, background 0.3s ease;
        }

        #yes-btn {
            background-color: #ff477e;
            color: white;
        }

        #yes-btn:hover {
            background-color: #ff2a65;
            transform: scale(1.1);
        }

        #no-btn {
            background-color: #ffffff;
            color: #ff477e;
            position: absolute;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        .success-video {
            width: 100%;
            max-width: 280px;
            border-radius: 25px;
            margin: 20px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background-color: transparent;
        }

        .side-banner {
            position: fixed;
            bottom: 40px;
            background: rgba(255, 255, 255, 0.95);
            color: #ff477e;
            padding: 14px 28px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }

        .side-banner.hide-right {
            transform: translateX(150vw);
            opacity: 0;
        }

        .side-banner.show-center {
            transform: translateX(0);
            opacity: 1;
            left: auto;
        }

        /* Floating Audio Toggle Button */
        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .music-toggle:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="Bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="music-btn" class="music-toggle">🎵</div>

    <div class="hearts-container" id="hearts-container"></div>

    <div id="proposal-card" class="container">
        <h1>Will you forever be mine? <br> prarthana 💕</h1>
        <p class="names">From: suhas 💌</p>
        
        <div class="btn-container">
            <button id="yes-btn">Yes 💞</button>
            <button id="no-btn">No 💔</button>
        </div>
    </div>

    <div id="success-card" class="container success-card-style hidden">
        <h1>Yay! I knew you'd say YES! 💕❤️</h1>
        <p style="color: white; margin-top: 10px; font-size: 1.1rem;">You're the most amazing person I know. I love you endlessly.</p>
        <p style="color: white; margin-top: 5px; font-size: 1.1rem; font-weight: bold;">~suhas</p>
        
        <video class="success-video" autoplay loop muted playsinline preload="auto">
            <source src="cat.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="banner" class="side-banner hide-right">Lmao ok, try again 😂</div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const proposalCard = document.getElementById('proposal-card');
        const successCard = document.getElementById('success-card');
        const banner = document.getElementById('banner');
        const body = document.body;
        const heartsContainer = document.getElementById('hearts-container');
        
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');

        const funnyMessages = [
            "Lmao ok, try again 😂",
            "YUP! In this economy?? 😂",
            "Error 404: No button not found 🚫",
            "That's so funny haha. Now say yes. 🙄"
        ];

        // Function to start music safely upon initial interaction
        function startMusic() {
            bgMusic.play().then(() => {
                musicBtn.innerText = "🎵";
                // Remove initial interaction triggers once playing successfully
                document.removeEventListener('click', startMusic);
                document.removeEventListener('touchstart', startMusic);
            }).catch(err => console.log("Audio waiting for absolute user interaction focus"));
        }

        // Add auto-trigger event listeners for mobile devices/desktops
        document.addEventListener('click', startMusic);
        document.addEventListener('touchstart', startMusic);

        // Manual play/pause control button logic
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevents triggering startMusic loop again
            if (bgMusic.paused) {
                bgMusic.play();
                musicBtn.innerText = "🎵";
            } else {
                bgMusic.pause();
                musicBtn.innerText = "🔇";
            }
        });

        // Function to dynamically generate falling hearts background
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            
            const heartTypes = ['❤️', '💖', '💝', '💕', '🤍'];
            heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's'; 
            heart.style.fontSize = Math.random() * 15 + 12 + 'px'; 
            
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createFallingHeart, 300);

        function moveButton(e) {
            if(e.type === 'touchstart') e.preventDefault();
            startMusic(); // Fallback trigger execution

            const padding = 40;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            triggerSideBanner();
        }

        function triggerSideBanner() {
            banner.classList.remove('show-center');
            banner.classList.add('hide-right');
            
            setTimeout(() => {
                const randomMessage = funnyMessages[Math.floor(Math.random() * funnyMessages.length)];
                banner.innerText = randomMessage;
                banner.classList.remove('hide-right');
                banner.classList.add('show-center');
            }, 50);
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', moveButton);
        noBtn.addEventListener('click', (e) => {
            e.preventDefault();
            moveButton(e);
        });

        yesBtn.addEventListener('click', () => {
            startMusic(); // Fallback trigger execution
            proposalCard.classList.add('hidden');
            successCard.classList.remove('hidden');
            banner.classList.remove('show-center');
            banner.classList.add('hide-right');
            body.classList.add('success-bg');
            
            const videoEl = document.querySelector('.success-video');
            if(videoEl) {
                videoEl.load();
                videoEl.play().catch(error => console.log("Video track playing"));
            }
        });
    </script>
</body>
</html>
